<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Recommended System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <style>
        .content-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 2rem;
            background-color: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .content-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .table {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .table th, .table td {
            text-align: center;
            vertical-align: middle;
        }

        .table th {
            background-color: #007bff;
            color: white;
            font-size: 1.1rem;
        }

        .table td {
            padding: 15px;
            font-size: 1rem;
        }

        .table tr:hover td {
            background-color: #f1f1f1;
        }

        .table td:first-child {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar bg-dark p-3">
        <div class="container-fluid">
          <a class="navbar-brand text-white" href="#">
            <img src="/static/f0ec7063-9d84-4382-9678-e896f761d406.jpg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
            Medical Recommended System
          </a>
        </div>
      </nav>

    <div class="content-container">
        <h2>Medical Information</h2>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Disease Name</td>
                    <td>{{ data.0 }}</td>
                </tr>
                <tr>
                    <td>Medicine Name</td>
                    <td>{{ data.1 }}</td>
                </tr>
                <tr>
                    <td>Diet</td>
                    <td>{{ data.2 }}</td>
                </tr>
                <tr>
                    <td>Description</td>
                    <td>{{ data.3 }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
</body>
</html>
