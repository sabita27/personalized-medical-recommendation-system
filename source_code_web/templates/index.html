<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
  <style>
    .but {
      background-color: orangered;
      width: 100%;
      border: none;
      height: 2.7rem;
    }

    .but:hover {
      opacity: 0.5;
      background-color: blue;
    }

    /* Add box shadow and animation */
    .form-container {
      margin: 0 8rem 0 8rem;
      padding: 3rem 5rem 3rem 5rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      /* Box shadow */
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      /* Animation on hover */
    }

    .form-container:hover {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      /* Increased box shadow on hover */
      transform: translateY(-5px);
      /* Lift effect */
    }
  </style>
</head>

<body>
  <nav class="navbar bg-dark p-3">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="#">
        <img src="/static/f0ec7063-9d84-4382-9678-e896f761d406.jpg" alt="Logo" width="30" height="24"
          class="d-inline-block align-text-top">
        Medical Recommended System
      </a>
    </div>
  </nav>

  <h1 class="mt-4" style="text-align: center;">Health Care Center</h1>

  <form target="_blank" class="bg-dark form-container" action="http://127.0.0.1:5000/predict" method="post">
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label text-white">Enter symptoms using the dropdown</label>
      <input name="sym" type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
        placeholder="Your symptoms will appear here..." readonly>
    </div>
    <div class="d-flex gap-2">
      <select id="symptomDropdown" name="symptom" class="form-select">
        <option value="" selected disabled>Select a symptom</option>
        {% for symptom in symptoms %}
        <option value="{{ symptom }}">{{ symptom }}</option>
        {% endfor %}
      </select>
      <button style="background-color: orangered;color: white;" type="button" class="btn"
        onclick="addSymptom()">Add</button>
    </div>
    <button type="submit" class="btn btn-primary but mt-3">Predict</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
    crossorigin="anonymous"></script>

  <script>
    function addSymptom() {
      const dropdown = document.getElementById("symptomDropdown");
      const input = document.getElementById("exampleInputEmail1");
      const selected = dropdown.value;

      // Avoid duplicates and add comma-separated
      if (input.value === "") {
        input.value = selected;
      } else {
        let current = input.value.split(',').map(s => s.trim());
        if (!current.includes(selected)) {
          current.push(selected);
          input.value = current.join(', ');
        }
      }
    }
  </script>

</body>

</html>
